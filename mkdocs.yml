site_name: GoogleKit
site_description: Unofficial Python SDK for Google Drive API, Google Sheets API, Google Calendar API, Google Docs API, and Google Slides API
site_url: https://ssujitx.github.io/GoogleKit/
repo_url: https://github.com/SSujitX/GoogleKit
repo_name: SSujitX/GoogleKit
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Authentication: authentication.md
  - Scopes: scopes.md
  - Errors: errors.md
  - Services:
      - Drive: drive.md
      - Sheets: sheets.md
      - Calendar: calendar.md
      - Docs: docs.md
      - Slides: slides.md
  - Publishing: publishing.md

plugins:
  - search
