site_name: GoogleKit
site_description: >-
  Unofficial Python SDK for Google Drive API, Google Sheets API, Google Calendar API,
  Google Docs API, and Google Slides API — OAuth, ADC, scopes, retries, and typed clients.
site_author: SSujitX
site_url: https://ssujitx.github.io/GoogleKit/
repo_url: https://github.com/SSujitX/GoogleKit
repo_name: SSujitX/GoogleKit
edit_uri: edit/master/docs/
copyright: >
  Copyright &copy; 2026 SSujitX — Unofficial SDK; not affiliated with Google LLC.
  Official APIs:
  <a href="https://developers.google.com/workspace" target="_blank" rel="noopener">Google Workspace APIs</a>

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SSujitX/GoogleKit
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/googlekit/
      name: PyPI
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Authentication: authentication.md
  - Scopes: scopes.md
  - Errors: errors.md
  - Services:
      - Drive: drive.md
      - Sheets: sheets.md
      - Calendar: calendar.md
      - Docs: docs.md
      - Slides: slides.md
  - Publishing: publishing.md

plugins:
  - search:
      lang: en
  - meta
  - social:
      cards: true
      cards_layout_options:
        background_color: "#3949AB"
        color: "#FFFFFF"
