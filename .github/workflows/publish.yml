name: Publish
run-name: "PyPI publish ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Test, PyPI, and GitHub Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI Trusted Publishing
      contents: write   # GitHub Release + assets

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Unit tests
        run: uv run pytest -m "not integration"

      - name: Verify tag matches pyproject version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PY_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          if [[ "$TAG_VERSION" != "$PY_VERSION" ]]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PY_VERSION"
            echo "Bump version in pyproject.toml, update RELEASE.md, then tag v$PY_VERSION."
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Matched version: $TAG_VERSION"

      - name: Build
        run: uv build

      - name: Smoke test wheel
        shell: bash
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/googlekit-*.whl | head -n 1)
          uv run --isolated --no-project --with "$WHEEL" python -c \
            "import googlekit; assert googlekit.__version__ == '${{ steps.version.outputs.version }}'"

      - name: Publish to PyPI
        run: uv publish

      - name: Extract RELEASE.md notes for this version
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          NOTES="$(python - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]
          text = Path("RELEASE.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(text)
          body = match.group(1).strip() if match else ""
          if not body:
              body = (
                  f"GoogleKit {version}\n\n"
                  "See [RELEASE.md](https://github.com/SSujitX/GoogleKit/blob/master/RELEASE.md) "
                  "for the full changelog."
              )
          print(body)
          PY
          )"
          {
            echo "body<<EOF_RELEASE_NOTES"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "**PyPI:** https://pypi.org/project/googlekit/${VERSION}/"
            echo "**Docs:** https://ssujitx.github.io/GoogleKit/"
            PREV="$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n 1 || true)"
            if [[ -n "${PREV}" ]]; then
              echo "**Full Changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
            echo "EOF_RELEASE_NOTES"
          } >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GoogleKit ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/googlekit-*.whl
            dist/googlekit-*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
