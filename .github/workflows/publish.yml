name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build
        run: uv build

      - name: Smoke test wheel
        shell: bash
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/googlekit-*.whl | head -n 1)
          uv run --isolated --no-project --with "$WHEEL" python -c "import googlekit; assert googlekit.__version__"

      - name: Publish
        run: uv publish
